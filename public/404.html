<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>trae-solo-showcase</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // 保存原始路径
      sessionStorage.redirect = location.pathname;
      
      // 检测是否在GitHub Pages环境
      const isGitHubPages = location.hostname === 'ricardo-m-j.github.io';
      
      // 重定向到正确的首页
      if (isGitHubPages) {
        location.href = '/trae-solo-hackathon-lab/';
      } else {
        location.href = '/';
      }
    </script>
  </body>
</html>
