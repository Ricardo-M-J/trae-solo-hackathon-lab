name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_BASE_PATH: /trae-lottery-demo
          VITE_API_PROXY_URL: ${{ secrets.VITE_API_PROXY_URL }}
          VITE_KIMI_API_KEY: ${{ secrets.VITE_KIMI_API_KEY }}
          VITE_PM_API_KEY: ${{ secrets.VITE_PM_API_KEY }}
          VITE_DESIGNER_API_KEY: ${{ secrets.VITE_DESIGNER_API_KEY }}
          VITE_DEV_API_KEY: ${{ secrets.VITE_DEV_API_KEY }}
          VITE_QA_API_KEY: ${{ secrets.VITE_QA_API_KEY }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
